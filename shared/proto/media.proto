syntax = "proto3";

package media;

option go_package = "media-manager/backend/gen";

// Media types
enum MediaType {
  IMAGE = 0;
  LIVE_PHOTO = 1;
  VIDEO = 2;
}

// Media metadata
message MediaMetadata {
  string id = 1;
  string filename = 2;
  MediaType type = 3;
  int64 size = 4;
  string mime_type = 5;
  int64 created_at = 6;
  int64 updated_at = 7;
  map<string, string> exif_data = 8;
  bool is_live_photo = 9;
  string live_photo_video_id = 10; // For Live Photos, reference to video file
  int32 width = 11;  // Image width in pixels
  int32 height = 12; // Image height in pixels
}

// Upload request - streamed for large files
message UploadMediaRequest {
  oneof data {
    MediaMetadata metadata = 1;
    bytes chunk_data = 2;
  }
}

// Upload response
message UploadMediaResponse {
  string media_id = 1;
  string status = 2;
  string message = 3;
}

// Get media list request
message GetMediaListRequest {
  int32 page = 1;
  int32 page_size = 2;
  MediaType filter_type = 3;
  string search_query = 4;
}

// Get media list response
message GetMediaListResponse {
  repeated MediaMetadata media_list = 1;
  int32 total_count = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// Delete media request
message DeleteMediaRequest {
  repeated string media_ids = 1;
}

// Delete media response
message DeleteMediaResponse {
  string status = 1;
  string message = 2;
  int32 deleted_count = 3;
}

// Get media metadata request
message GetMediaMetadataRequest {
  string media_id = 1;
}

// Get media metadata response
message GetMediaMetadataResponse {
  MediaMetadata metadata = 1;
}

// Media service definition
service MediaService {
  rpc UploadMedia(stream UploadMediaRequest) returns (UploadMediaResponse);
  rpc GetMediaList(GetMediaListRequest) returns (GetMediaListResponse);
  rpc DeleteMedia(DeleteMediaRequest) returns (DeleteMediaResponse);
  rpc GetMediaMetadata(GetMediaMetadataRequest) returns (GetMediaMetadataResponse);
}
